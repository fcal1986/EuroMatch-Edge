name: Daily Data Pipeline

on:
  # ── Manual trigger (for testing)
  workflow_dispatch:
    inputs:
      date_from:
        description: "Date from (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""
      date_to:
        description: "Date to (YYYY-MM-DD). Defaults to tomorrow."
        required: false
        default: ""
      dry_run:
        description: "Dry run (no writes to Supabase)"
        required: false
        type: boolean
        default: false

  # ── Automatic run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"

jobs:
  pipeline:
    name: Fetch → Enrich → Compute
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      # ── 3. Install dependencies
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 4. Resolve parameters
      - name: Resolve run parameters
        id: params
        run: |
          DATE_FROM="${{ github.event.inputs.date_from }}"
          DATE_TO="${{ github.event.inputs.date_to }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          FETCH_FLAGS=""
          COMPUTE_FLAGS=""

          if [ -n "$DATE_FROM" ]; then
            FETCH_FLAGS="$FETCH_FLAGS --date-from $DATE_FROM"
          fi

          if [ -n "$DATE_TO" ]; then
            FETCH_FLAGS="$FETCH_FLAGS --date-to $DATE_TO"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            FETCH_FLAGS="$FETCH_FLAGS --dry-run"
            COMPUTE_FLAGS="$COMPUTE_FLAGS --dry-run"
          fi

          echo "fetch_flags=$FETCH_FLAGS" >> "$GITHUB_OUTPUT"
          echo "compute_flags=$COMPUTE_FLAGS" >> "$GITHUB_OUTPUT"

      # ── 5. Fetch matches
      - name: Fetch matches
        working-directory: scripts
        env:
          FOOTBALL_DATA_API_KEY:     ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "── fetch_matches.py ${{ steps.params.outputs.fetch_flags }}"
          python fetch_matches.py ${{ steps.params.outputs.fetch_flags }}

      # ── 6. Enrich matches
      - name: Enrich matches
        working-directory: scripts
        env:
          FOOTBALL_DATA_API_KEY:     ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "── enrich_matches.py"
          python enrich_matches.py

      # ── 7. Compute predictions
      - name: Compute predictions
        working-directory: scripts
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "── compute_predictions.py ${{ steps.params.outputs.compute_flags }}"
          python compute_predictions.py ${{ steps.params.outputs.compute_flags }}

      # ── 8. Summary
      - name: Pipeline summary
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "Pipeline finished"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Run ID  : ${{ github.run_id }}"
          echo "  Status  : ${{ job.status }}"
          echo "══════════════════════════════════════"