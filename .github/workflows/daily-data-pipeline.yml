name: Daily Data Pipeline

"on":
  workflow_dispatch:
    inputs:
      date_from:
        description: "Date from (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""
      date_to:
        description: "Date to (YYYY-MM-DD). Defaults to tomorrow."
        required: false
        default: ""
      dry_run:
        description: "Dry run (no writes to Supabase)"
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 6-23 * * *"

jobs:
  pipeline:
    name: Fetch & Compute
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Resolve run parameters
        id: params
        shell: bash
        run: |
          DATE_FROM="${{ github.event.inputs.date_from }}"
          DATE_TO="${{ github.event.inputs.date_to }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          FETCH_FLAGS=""
          ENRICH_FLAGS=""
          COMPUTE_FLAGS="--dirty-only"

          if [ -n "$DATE_FROM" ]; then
            FETCH_FLAGS="$FETCH_FLAGS --date-from $DATE_FROM"
            ENRICH_FLAGS="$ENRICH_FLAGS --date-from $DATE_FROM"
          fi
          if [ -n "$DATE_TO" ]; then
            FETCH_FLAGS="$FETCH_FLAGS --date-to $DATE_TO"
            ENRICH_FLAGS="$ENRICH_FLAGS --date-to $DATE_TO"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            FETCH_FLAGS="$FETCH_FLAGS --dry-run"
            ENRICH_FLAGS="$ENRICH_FLAGS --dry-run"
            COMPUTE_FLAGS="$COMPUTE_FLAGS --dry-run"
          fi

          echo "fetch_flags=$FETCH_FLAGS" >> "$GITHUB_OUTPUT"
          echo "enrich_flags=$ENRICH_FLAGS" >> "$GITHUB_OUTPUT"
          echo "compute_flags=$COMPUTE_FLAGS" >> "$GITHUB_OUTPUT"

          echo "── Run parameters ──────────────────────"
          echo "  date_from      : ${DATE_FROM:-<default>}"
          echo "  date_to        : ${DATE_TO:-<default>}"
          echo "  dry_run        : ${DRY_RUN:-false}"
          echo "  fetch_flags    : $FETCH_FLAGS"
          echo "  enrich_flags   : $ENRICH_FLAGS"
          echo "  compute_flags  : $COMPUTE_FLAGS"

      - name: Fetch matches
        working-directory: scripts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "── fetch_matches.py ${{ steps.params.outputs.fetch_flags }}"
          python fetch_matches.py ${{ steps.params.outputs.fetch_flags }}

      - name: Enrich matches
        working-directory: scripts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "── enrich_matches.py ${{ steps.params.outputs.enrich_flags }}"
          python enrich_matches.py ${{ steps.params.outputs.enrich_flags }}

      - name: Compute predictions
        working-directory: scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APP_VERSION: ${{ vars.APP_VERSION }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          MODEL_VERSION: "1.0"
          CALIBRATION_VERSION: "1.0"
          WEIGHTS_VERSION: "1.0"
        run: |
          echo "── compute_predictions.py ${{ steps.params.outputs.compute_flags }}"
          python compute_predictions.py ${{ steps.params.outputs.compute_flags }}

      - name: Pipeline summary
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "Pipeline finished"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Run ID  : ${{ github.run_id }}"
          echo "  Status  : ${{ job.status }}"
          echo "══════════════════════════════════════"
