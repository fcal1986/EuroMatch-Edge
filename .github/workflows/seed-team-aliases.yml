name: Seed Team Aliases

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (keine Writes in die DB)"
        required: true
        type: boolean
        default: true

jobs:
  seed-team-aliases:
    name: Seed Team Aliases
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run seed_team_aliases.py
        working-directory: scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        shell: bash
        run: |
          echo "══════════════════════════════════════"
          echo "Seed Team Aliases"
          echo "  dry_run : ${{ github.event.inputs.dry_run }}"
          echo "══════════════════════════════════════"

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "── python seed_team_aliases.py --dry-run"
            python seed_team_aliases.py --dry-run
          else
            echo "── python seed_team_aliases.py"
            python seed_team_aliases.py
          fi

      - name: Pipeline summary
        if: always()
        run: |
          echo "══════════════════════════════════════"
          echo "Seed Team Aliases finished"
          echo "  Run ID  : ${{ github.run_id }}"
          echo "  Status  : ${{ job.status }}"
          echo "══════════════════════════════════════"