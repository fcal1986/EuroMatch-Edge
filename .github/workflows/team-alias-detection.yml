name: Team Alias Detection

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

jobs:
  detect-team-aliases:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect team alias candidates
        run: python scripts/detect_team_alias_candidates.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_LOOKAHEAD_DAYS: "14"